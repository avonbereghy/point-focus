<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- 03 · Trajectory — a faint ghost point at upper-left, a curved motion
       arc that thickens and brightens as it approaches the destination, and
       a hot focal point at the landing. Reads as: "Cmd+Tab — the cursor warps
       from wherever it was to exactly here." -->
  <defs>
    <radialGradient id="bg3" cx="0.3" cy="0.25" r="1.0">
      <stop offset="0" stop-color="#1a2340"/>
      <stop offset="1" stop-color="#080b14"/>
    </radialGradient>
    <radialGradient id="halo3" cx="0.68" cy="0.68" r="0.55">
      <stop offset="0" stop-color="#4ac9ff" stop-opacity="0.20"/>
      <stop offset="0.6" stop-color="#2a8fd8" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#2a8fd8" stop-opacity="0"/>
    </radialGradient>
    <!-- Trail gradient: cool cyan fading in from nothing, warming toward amber at the landing -->
    <linearGradient id="trail3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"    stop-color="#4ac9ff" stop-opacity="0"/>
      <stop offset="0.25" stop-color="#4ac9ff" stop-opacity="0.35"/>
      <stop offset="0.65" stop-color="#7fdbff" stop-opacity="0.85"/>
      <stop offset="1"    stop-color="#ffcf72" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="trailEdge3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"    stop-color="#4ac9ff" stop-opacity="0"/>
      <stop offset="0.5"  stop-color="#e8f4ff" stop-opacity="0.4"/>
      <stop offset="1"    stop-color="#fff8e6" stop-opacity="0.95"/>
    </linearGradient>
    <radialGradient id="dot3" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0"    stop-color="#fff8e6"/>
      <stop offset="0.22" stop-color="#ffcf72"/>
      <stop offset="0.55" stop-color="#ff9430" stop-opacity="0.8"/>
      <stop offset="1"    stop-color="#ff7a20" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ghost3" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0"   stop-color="#4ac9ff" stop-opacity="0.55"/>
      <stop offset="1"   stop-color="#4ac9ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" rx="96" fill="url(#bg3)"/>
  <rect width="512" height="512" rx="96" fill="url(#halo3)"/>

  <!-- Ghost source: faint, desaturated point at upper-left -->
  <circle cx="148" cy="148" r="30" fill="url(#ghost3)"/>
  <circle cx="148" cy="148" r="5" fill="#4ac9ff" opacity="0.55"/>

  <!-- Motion trail: a thick curved stroke (cubic bezier) that tapers and
       warms toward the destination. We use two stacked strokes for glow. -->
  <path d="M 148 148 C 230 170, 250 280, 348 336"
        fill="none" stroke="url(#trail3)" stroke-width="18"
        stroke-linecap="round" opacity="0.85"/>
  <path d="M 148 148 C 230 170, 250 280, 348 336"
        fill="none" stroke="url(#trailEdge3)" stroke-width="5"
        stroke-linecap="round"/>

  <!-- A few trailing "sparks" along the path to imply speed -->
  <circle cx="186" cy="176" r="2.5" fill="#4ac9ff" opacity="0.35"/>
  <circle cx="218" cy="210" r="2" fill="#4ac9ff" opacity="0.45"/>
  <circle cx="244" cy="252" r="2.5" fill="#7fdbff" opacity="0.55"/>
  <circle cx="278" cy="290" r="3" fill="#a4e5ff" opacity="0.7"/>
  <circle cx="312" cy="316" r="3.5" fill="#d9f2ff" opacity="0.85"/>

  <!-- Landing ring — a single thin ring around the focal point -->
  <circle cx="348" cy="336" r="80" fill="none" stroke="#4ac9ff"
          stroke-width="1.5" stroke-dasharray="4 7" opacity="0.5"/>

  <!-- Focal glow + bright core at landing -->
  <circle cx="348" cy="336" r="50" fill="url(#dot3)"/>
  <circle cx="348" cy="336" r="9"  fill="#fff8e6"/>
</svg>
